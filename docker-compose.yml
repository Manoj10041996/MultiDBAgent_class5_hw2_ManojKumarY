services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: stockpulse_postgres
    environment:
      POSTGRES_USER: stockpulse
      POSTGRES_PASSWORD: stockpulse_dev
      POSTGRES_DB: stockpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0
    container_name: stockpulse_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: stockpulse
      MONGO_INITDB_ROOT_PASSWORD: stockpulse_dev
      MONGO_INITDB_DATABASE: stockpulse
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data:
